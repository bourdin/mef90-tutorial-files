verbose: 0
time:
  min: 0
  max: 100
  numstep: 101
  interpolation: linear
boundaryDisplacement:
  scaling: linear
boundarytemperature:
  scaling: linear
defmech:
  timeStepping:
    type: quasistatic
  solver:
    type: altmin
  damage:
    atol: 1e-3
  sor:
    omega: 1
  pclag: 5
displacement:
  snes:
    type: ksponly
  pc:
    type: hypre
heatxfer:
  timestepping:
    type: null
temperature:
  export: 0
cs0001:
  # center layer
  hookeslaw:
    type: isotropic
    isotropic:
      YoungsModulus: 1
      PoissonRatio: 0.2
      PlaneStress: 1
  LinearThermalExpansion: 0,0,0
  damage:
    type: AT1
    FractureToughness: 1
    internallength: 0.05
    residualstiffness: 1e-5
  plasticity:
    type: NONE
  displacementbc: no,no,no
  damageBC: no
  boundarytemperature: 1
cs0002:
  # outer layer
  hookeslaw:
    type: isotropic
    isotropic:
      YoungsModulus: 0.5
      PoissonRatio: 0.2
      PlaneStress: 1
  LinearThermalExpansion: 0,0,0
  damage:
    type: AT1
    elastic: yes
    FractureToughness: 1
    internallength: 0.05
    residualstiffness: 1e-5
  plasticity:
    type: NONE
  displacementbc: no,no,no
  damageBC: no
  boundarytemperature: 1
fs0030:
  # top edge
  displacementbc: no,no,no
  boundaryDisplacement: 0,0,0
  damageBC: no
fs0040:
  # bottom edge
  displacementbc: no,yes,no
  boundaryDisplacement: 0,0,0
  damageBC: no
fs0050:
  # left edge
  displacementbc: yes,no,no
  boundaryDisplacement: -1,0,0
  damageBC: yes
  boundaryDamage: 0
fs0060:
  # left edge
  displacementbc: yes,no,no
  boundaryDisplacement: 1,0,0
  damageBC: yes
  boundaryDamage: 0
