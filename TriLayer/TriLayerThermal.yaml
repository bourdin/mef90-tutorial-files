verbose: 0
time:
  min: 0
  max: 100
  numstep: 101
  interpolation: quadratic
boundaryDisplacement:
  scaling: linear
boundarytemperature:
  scaling: linear
temperature:
  export: 1
defmech:
  mode: quasistatic
  damage:
    atol: 1e-3
  sor:
    omega: 1
  pclag: 5
displacement:
  snes:
    type: ksponly
  pc:
    type: hypre
heatxfer:
  mode: steadystate
  initialtemperature: 0
cs0001:
  # center layer
  hookeslaw:
    type: isotropic
    isotropic:
      YoungsModulus: 1
      PoissonRatio: 0.2
      PlaneStress: 1
  LinearThermalExpansion: 1,1,0
  damage:
    type: AT1
    elastic: yes
    FractureToughness: 1
    internallength: 0.5
    residualstiffness: 0
  plasticity:
    type: NONE
  displacementbc: no,no,no
  damageBC: no
cs0002:
  # outer layer
  hookeslaw:
    type: isotropic
    isotropic:
      YoungsModulus: 0.5
      PoissonRatio: 0.4
      PlaneStress: 1
  LinearThermalExpansion: 1.,1.,0
  damage:
    type: AT1
    elastic: yes
    FractureToughness: 1
    internallength: 0.5
    residualstiffness: 0
  plasticity:
    type: NONE
  displacementbc: no,no,no
  damageBC: no
fs0040:
  # top edge
  displacementbc: no,no,no
  boundaryDisplacement: 0,0,0
  damageBC: no
  temperatureBC: yes
  boundarytemperature: 1
fs0030:
  # bottom edge
  displacementbc: no,yes,no
  boundaryDisplacement: 0,0,0
  damageBC: no
  temperatureBC: no
  boundaryflux: -1
fs0050:
  # left edge
  displacementbc: no,no,no
  damageBC: yes
  boundaryDamage: 0
  temperatureBC: no
fs0060:
  # right edge
  displacementbc: no,no,no
  damageBC: yes
  boundaryDamage: 0
  temperatureBC: no
