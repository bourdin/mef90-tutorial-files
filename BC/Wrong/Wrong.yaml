### global options
verbose: 0
boundaryDisplacement:
  scaling: linear
defmech:
  irrevthres: 0
  timestepping:
    type: quasistatic
heatxfer:
  timestepping:
    type: null
temperature:
  export: 0
time:
  min: 0
  max: 5
  numstep: 21
cs0001:
  hookesLaw:
    type: isotropic
    isotropic:
      YoungsModulus: 1
      PoissonRatio: 0
      PlaneStress: 0
  damage:
    type: AT1
    FractureToughness: 0.1
    internallength: 0.4
    residualstiffness: 0
  plasticity:
    type: NONE
  displacementbc: no,no,no
  damageBC: no
fs0020:
  displacementbc: yes,yes,no
  boundaryDisplacement: 0,.5,0
  damageBC: no
fs0030:
  displacementbc: yes,yes,no
  boundaryDisplacement: 0,0.,0
  damageBC: no
